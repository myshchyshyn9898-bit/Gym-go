<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gym Go">
    <meta name="theme-color" content="#ffffff">
    
    <link rel="apple-touch-icon" href="https://img.icons8.com/nolan/256/dumbbell.png">
    <link rel="icon" type="image/png" href="https://img.icons8.com/nolan/256/dumbbell.png">

    <link rel="manifest" href='data:application/manifest+json,{"name":"Gym Go Pro","short_name":"Gym Go","display":"standalone","background_color":"#ffffff","theme_color":"#ff7f50","icons":[{"src":"https://img.icons8.com/nolan/256/dumbbell.png","sizes":"256x256","type":"image/png"}]}'>

    <title>Gym Go - Live Sync</title>
    
    <style>
        :root {
            --bg-color: #fcfaf7; 
            --card-bg: #ffffff; 
            --text-main: #000000; 
            --text-muted: #888888; 
            --primary-orange: #ff7f50; 
            --shadow: 0 10px 30px rgba(0,0,0,0.05); 
            --bg-tabbar: rgba(15, 15, 15, 0.9); 
        }

        body {
            background-color: var(--bg-color); color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 20px; padding-bottom: 120px;
            -webkit-font-smoothing: antialiased;
        }

        #splash-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: var(--bg-color); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.4s ease-out; }
        .splash-logo { font-size: 42px; font-weight: 900; color: var(--text-main); letter-spacing: 2px; text-transform: uppercase; display: flex; align-items: center; gap: 10px; }
        .splash-logo span { color: var(--primary-orange); }
        .splash-loader { width: 40px; height: 4px; background: #e0e0e0; margin-top: 20px; border-radius: 2px; overflow: hidden; }
        .splash-loader-bar { width: 0%; height: 100%; background: var(--primary-orange); animation: load 1s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes load { 100% { width: 100%; } }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; margin-top: 15px; }
        h1 { font-size: 22px; font-weight: 800; margin: 0; letter-spacing: 0.5px; display: flex; align-items: center; gap: 8px;}
        h1 span { color: var(--text-muted); font-weight: 500; display: flex; align-items: center; gap: 5px; font-size: 16px;}
        .live-dot { width: 8px; height: 8px; background: #FF453A; border-radius: 50%; box-shadow: 0 0 8px #FF453A; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .progress-section { display: flex; justify-content: space-between; margin-bottom: 30px; gap: 5px; }
        .ring-container { display: flex; flex-direction: column; align-items: center; width: 14%; }
        .circular-chart { max-width: 40px; max-height: 40px; }
        .circle-bg { fill: none; stroke: #e0e0e0; stroke-width: 3.8; }
        .circle { fill: none; stroke-width: 2.8; stroke-linecap: round; transition: stroke-dasharray 0.5s ease; stroke: var(--primary-orange); }
        .ring-label { font-size: 10px; color: var(--text-muted); margin-top: 6px; font-weight: 600; }

        .card { background: var(--card-bg); border-radius: 24px; padding: 25px 20px; margin-bottom: 15px; display: flex; align-items: center; position: relative; overflow: hidden; cursor: pointer; box-shadow: var(--shadow); transition: transform 0.2s; }
        .card:active { transform: scale(0.96); }
        .date-col { text-align: center; margin-right: 20px; min-width: 45px; }
        .day-name { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--primary-orange); }
        .day-num { font-size: 26px; font-weight: 800; margin: 2px 0; }
        .month-name { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }

        .info-col { flex-grow: 1; }
        .title { font-size: 18px; font-weight: 800; margin-bottom: 4px; text-transform: uppercase; }
        .subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; }

        .supps-container { display: flex; flex-wrap: wrap; gap: 8px; }
        .supps-pill { display: inline-flex; align-items: center; background: #f1f1f1; border-radius: 12px; padding: 6px 12px; font-size: 12px; font-weight: 600; gap: 6px; color: var(--primary-orange); }
        .supps-pill span { color: var(--text-muted); font-weight: 400; font-size: 10px; display: block; }

        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: flex-end; z-index: 1000; opacity: 0; transition: opacity 0.3s ease; }
        .modal-content { background: var(--card-bg); width: 100%; border-radius: 30px 30px 0 0; padding: 30px 25px 40px; box-sizing: border-box; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); max-height: 85vh; overflow-y: auto; position: relative; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .close-btn { position: absolute; top: 15px; right: 20px; background: #f1f1f1; border-radius: 50%; width: 30px; height: 30px; display: flex; justify-content: center; align-items: center; color: var(--text-muted); cursor: pointer; z-index: 10; }
        .modal-title { font-size: 24px; font-weight: 800; margin-bottom: 5px; }
        .modal-subtitle { color: var(--text-muted); margin-bottom: 25px; font-size: 14px; }
        .section-title { font-size: 12px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 10px; font-weight: 700; display: flex; align-items: center; gap: 6px;}
        
        .exercise-item { background: #f9f9f9; padding: 15px; border-radius: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .ex-name { font-size: 15px; font-weight: 600; }
        .ex-sets { background: rgba(255, 127, 80, 0.1); padding: 5px 10px; border-radius: 8px; font-size: 13px; font-weight: 700; color: var(--primary-orange); }
        .supp-box { background: rgba(255, 127, 80, 0.05); border: 1px solid rgba(255, 127, 80, 0.15); padding: 15px; border-radius: 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; }
        .supp-box.rest-box { background: rgba(142, 142, 147, 0.05); border: 1px solid rgba(142, 142, 147, 0.15); }
        .supp-time { font-size: 12px; color: var(--text-muted); margin-bottom: 3px; display: flex; align-items: center; gap: 4px;}
        .supp-desc { font-size: 15px; font-weight: 600; }
        
        .complete-btn { background: #000000; color: #ffffff; width: 100%; padding: 18px; border-radius: 16px; font-weight: 800; border: none; font-size: 16px; margin-top: 30px; cursor: pointer; transition: background 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;}
        .complete-btn:active { background: #333333; }
        .complete-btn.done { background: var(--primary-orange); }

        .tab-view { display: none; animation: fadeIn 0.3s ease; }
        .tab-view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        input, select { background: #f1f1f1; border: 1px solid #e0e0e0; color: var(--text-main); padding: 14px; border-radius: 12px; width: 100%; box-sizing: border-box; margin-bottom: 12px; font-family: inherit; font-size: 15px; font-weight: 600; }
        input:focus, select:focus { outline: none; border-color: var(--primary-orange); }

        .edit-list-item { background: #f9f9f9; padding: 15px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .edit-info-title { font-size: 15px; font-weight: 700; }
        .edit-info-sub { font-size: 13px; color: var(--primary-orange); margin-top: 4px; font-weight: 600; }
        .edit-info-sub.supp { color: var(--text-muted); font-weight: 400; }
        .edit-actions { display: flex; gap: 15px; }
        .action-btn { background: none; border: none; cursor: pointer; padding: 0; color: var(--text-muted); opacity: 0.7; transition: opacity 0.2s; display: flex; align-items: center; justify-content: center;}
        .action-btn:active { opacity: 1; transform: scale(0.9); }
        .add-btn-small { background: rgba(255, 127, 80, 0.05); color: var(--primary-orange); border: 1px dashed rgba(255, 127, 80, 0.3); width: 100%; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; margin-bottom: 20px; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 6px;}

        .stats-grid { display: flex; flex-wrap: wrap; gap: 15px; justify-content: space-between; margin-bottom: 25px; }
        .stat-ring-card { background: var(--card-bg); border-radius: 24px; padding: 25px 15px; width: calc(50% - 7.5px); display: flex; flex-direction: column; align-items: center; justify-content: center; box-sizing: border-box; position: relative; box-shadow: var(--shadow); }
        .large-circular-chart { display: block; margin: 0 auto; max-width: 150px; max-height: 150px; width: 100%; }
        .large-circular-chart .circle-bg-dashed { fill: none; stroke: #e0e0e0; stroke-width: 1.5; stroke-dasharray: 2, 3; }
        .large-circular-chart .circle { fill: none; stroke-width: 3.5; stroke-linecap: round; stroke: var(--primary-orange); transition: stroke-dasharray 1s ease-out; }
        .large-circular-chart .percentage { fill: var(--text-main); font-size: 9px; font-weight: 300; text-anchor: middle; letter-spacing: -0.5px;}
        .large-circular-chart .stat-name-text { fill: var(--primary-orange); font-size: 3.5px; font-weight: 600; text-anchor: middle; text-transform: uppercase; letter-spacing: 0.5px; }
        .large-circular-chart .stat-val-text { fill: var(--text-muted); font-size: 2.5px; font-weight: 500; text-anchor: middle; }

        .switch { position: relative; display: inline-block; width: 50px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #e0e0e0; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input:checked + .slider { background-color: var(--primary-orange); }
        input:checked + .slider:before { transform: translateX(22px); }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-tabbar); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: flex; justify-content: space-around; align-items: center; padding: 15px 10px 30px; z-index: 900; border-radius: 30px 30px 0 0; }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; color: var(--text-muted); cursor: pointer; width: 20%; transition: color 0.2s; opacity: 0.7; }
        .nav-item.active { color: #ffffff; opacity: 1; }
        .nav-item.center-btn { position: relative; bottom: 0px; background: var(--primary-orange); width: 60px; height: 60px; border-radius: 50%; opacity: 1; color: #ffffff; box-shadow: 0 5px 20px rgba(255, 127, 80, 0.4); }
        .nav-item.center-btn.active { color: #ffffff; opacity: 1; }
        .nav-icon { height: 24px; width: 24px; display: flex; justify-content: center; align-items: center; }
        .nav-icon svg { width: 100%; height: 100%; fill: currentColor; }
        .nav-text { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

        /* SVG іконки глобально */
        .svg-icon { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-logo">GYM <span>GO</span></div>
        <div class="splash-loader"><div class="splash-loader-bar"></div></div>
    </div>

    <header>
        <h1>GYM GO <span><div class="live-dot"></div> LIVE SYNC</span></h1>
    </header>

    <div id="tab-home" class="tab-view active">
        <div class="progress-section">
            <div class="ring-container"><svg viewBox="0 0 36 36" class="circular-chart"><path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" /><path class="circle" id="ring-mon" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" /></svg><div class="ring-label">ПН</div></div>
            <div class="ring-container"><svg viewBox="0 0 36 36" class="circular-chart"><path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" /><path class="circle" id="ring-tue" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" /></svg><div class="ring-label">ВТ</div></div>
            <div class="ring-container"><svg viewBox="0 0 36 36" class="circular-chart"><path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" /><path class="circle" id="ring-wed" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" /></svg><div class="ring-label">СР</div></div>
            <div class="ring-container"><svg viewBox="0 0 36 36" class="circular-chart"><path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" /><path class="circle" id="ring-thu" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" /></svg><div class="ring-label">ЧТ</div></div>
            <div class="ring-container"><svg viewBox="0 0 36 36" class="circular-chart"><path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" /><path class="circle" id="ring-fri" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" /></svg><div class="ring-label">ПТ</div></div>
            <div class="ring-container"><svg viewBox="0 0 36 36" class="circular-chart"><path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" /><path class="circle" id="ring-sat" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" /></svg><div class="ring-label">СБ</div></div>
            <div class="ring-container"><svg viewBox="0 0 36 36" class="circular-chart"><path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" /><path class="circle" id="ring-sun" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" /></svg><div class="ring-label">НД</div></div>
        </div>

        <div id="workout-cards-container"></div>
    </div>

    <div id="tab-stats" class="tab-view">
        <div class="section-title">
            <svg class="svg-icon" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg> 
            Твій Прогрес
        </div>
        <div id="stats-rings-container" class="stats-grid" style="margin-top: 15px;"></div>

        <div class="section-title" style="margin-top: 30px;">
            <svg class="svg-icon" viewBox="0 0 24 24"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line><line x1="1" y1="14" x2="7" y2="14"></line><line x1="9" y1="8" x2="15" y2="8"></line><line x1="17" y1="16" x2="23" y2="16"></line></svg>
            Налаштувати показники
        </div>
        <div id="stats-edit-list" style="margin-top: 15px;"></div>
        
        <button class="add-btn-small" onclick="window.addStat()">
            <svg class="svg-icon" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            ДОДАТИ ПОКАЗНИК
        </button>

        <div class="section-title" style="margin-top: 30px;">
            <svg class="svg-icon" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
            Налаштування сповіщень
        </div>
        <div class="edit-list-item" style="margin-bottom: 20px; margin-top: 15px;">
            <div>
                <div class="edit-info-title">Push-сповіщення</div>
                <div class="edit-info-sub supp">Додати план в Календар iOS</div>
            </div>
            <label class="switch">
                <input type="checkbox" id="calendar-toggle" onchange="window.toggleCalendar(this)">
                <span class="slider round"></span>
            </label>
        </div>
    </div>

    <div id="tab-edit" class="tab-view">
        <div class="section-title" style="margin-bottom: 15px;">
            <svg class="svg-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            Редагування плану
        </div>
        
        <select id="edit-day-select" onchange="window.loadDayForEdit()">
            <option value="mon">Понеділок (Push)</option>
            <option value="tue">Вівторок (Відпочинок)</option>
            <option value="wed">Середа (Pull)</option>
            <option value="thu">Четвер (Відпочинок)</option>
            <option value="fri">П'ятниця (Legs)</option>
            <option value="sat">Субота (Upper Focus)</option>
            <option value="sun">Неділя (Відпочинок)</option>
        </select>

        <div style="background: var(--card-bg); padding: 20px; border-radius: 20px; margin-bottom: 20px; box-shadow: var(--shadow);">
            <div class="section-title" style="margin-bottom: 10px;">Назва та фокус дня</div>
            <input type="text" id="edit-title" placeholder="Назва тренування" onchange="window.quickSaveHeader()">
            <input type="text" id="edit-sub" placeholder="Підзаголовок" style="margin-bottom: 0;" onchange="window.quickSaveHeader()">
        </div>

        <div class="section-title">
            <svg class="svg-icon" viewBox="0 0 24 24"><path d="M10.5 20.5a7 7 0 0 1-9.9-9.9l8.5-8.5a7 7 0 0 1 9.9 9.9z"></path><line x1="15.5" y1="8.5" x2="8.5" y2="15.5"></line></svg>
            Добавки на цей день
        </div>
        <div id="edit-supps-list" style="margin-top: 15px;"></div>
        <button class="add-btn-small" onclick="window.addSupp()">
            <svg class="svg-icon" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            ДОДАТИ ДОБАВКУ
        </button>

        <div class="section-title" style="margin-top: 30px;">
            <svg class="svg-icon" viewBox="0 0 24 24"><path d="M6.5 6.5l11 11"></path><path d="M21 21l-1-1"></path><path d="M3 3l1 1"></path><path d="M18 22l4-4"></path><path d="M2 6l4-4"></path><path d="M3 10l7-7"></path><path d="M14 21l7-7"></path></svg>
            Вправи на цей день
        </div>
        <div id="edit-exercises-list" style="margin-top: 15px;"></div>
        <button class="add-btn-small" onclick="window.addExercise()">
            <svg class="svg-icon" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            ДОДАТИ ВПРАВУ
        </button>
    </div>

    <nav class="bottom-nav">
        <div id="nav-home" class="nav-item active" onclick="window.switchTab('home', this)">
            <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>
            <div class="nav-text">Головна</div>
        </div>
        <div id="nav-stats" class="nav-item" onclick="window.switchTab('stats', this)">
            <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"/></svg></div>

        const firebaseConfig = {
            apiKey: "AIzaSyBRSU_3_0pueE5kQfY_3jr1TNCozF1lOsw",
            authDomain: "go-gym-e604f.firebaseapp.com",
            projectId: "go-gym-e604f",
            storageBucket: "go-gym-e604f.firebasestorage.app",
            messagingSenderId: "284048669638",
            appId: "1:284048669638:web:c89a7d67b9be64298750c7",

        const app = initializeApp(firebaseConfig);

        const rootRef = ref(db, '/');

        let savedProgress = {};

        const months = ['Січ', 'Лют', 'Бер', 'Кві', 'Тра', 'Чер', 'Лип', 'Сер', 'Вер', 'Жов', 'Лис', 'Гру'];

        let workoutData = {
            'mon': { title: 'Тренування Push', sub: 'Понеділок • Груди, Плечі, Тріцепс', supps: [{ time: 'ЗРАНКУ', text: '1 порція Протеїну' }, { time: 'ПІСЛЯ ТРЕНУВАННЯ', text: 'Протеїн (1 порція) + Креатин (5г)' }], exercises: [{ name: 'Жим штанги лежачи', sets: '4 × 8-10' }, { name: 'Жим гантелей під кутом', sets: '3 × 10-12' }, { name: 'Жим сидячи (Плечі)', sets: '3 × 10-12' }, { name: 'Махи гантелями', sets: '3 × 15' }, { name: 'Французький жим', sets: '3 × 10-12' }] },
            'tue': { title: 'Відпочинок', sub: 'Вівторок • Відновлення', supps: [{ time: 'ЗРАНКУ', text: 'Креатин (5г)' }], exercises: [] },
            'wed': { title: 'Тренування Pull', sub: 'Середа • Спина, Біцепс', supps: [{ time: 'ЗРАНКУ', text: '1 порція Протеїну' }, { time: 'ПІСЛЯ ТРЕНУВАННЯ', text: 'Протеїн (1 порція) + Креатин (5г)' }], exercises: [{ name: 'Підтягування', sets: '4 × Max' }, { name: 'Тяга штанги', sets: '4 × 8-10' }, { name: 'Тяга блоку', sets: '3 × 10-12' }, { name: 'Підйом на біцепс', sets: '3 × 10-12' }] },
            'thu': { title: 'Відпочинок', sub: 'Четвер • Ріст м\'язів', supps: [{ time: 'ЗРАНКУ', text: 'Креатин (5г)' }], exercises: [] },
            'fri': { title: 'Тренування Legs', sub: 'П\'ятниця • Ноги та Прес', supps: [{ time: 'ЗРАНКУ', text: '1 порція Протеїну' }, { time: 'ПІСЛЯ ТРЕНУВАННЯ', text: 'Протеїн (1 порція) + Креатин (5г)' }], exercises: [{ name: 'Присідання', sets: '4 × 8-10' }, { name: 'Жим ногами', sets: '3 × 10-12' }, { name: 'Скручування', sets: '4 × 20' }] },
            'sat': { title: 'Upper Focus', sub: 'Субота • Плечі, Руки', supps: [{ time: 'ЗРАНКУ', text: '1 порція Протеїну' }, { time: 'ПІСЛЯ ТРЕНУВАННЯ', text: 'Протеїн (1 порція) + Креатин (5г)' }], exercises: [{ name: 'Армійський жим', sets: '4 × 8-10' }, { name: 'Махи в сторони', sets: '4 × 15' }] },
            'sun': { title: 'Відпочинок', sub: 'Неділя • Відновлення', supps: [{ time: 'ЗРАНКУ', text: 'Креатин (5г)' }], exercises: [] }
        };

        let currentActiveDay = '';
        let currentDates = {};
        let rawDatesForCalendar = {};

        function getMondayID() {
            let curr = new Date(); let day = curr.getDay(); let diff = curr.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(curr.setDate(diff)).toDateString(); 
        }

        function renderMainCards() {
            const container = document.getElementById('workout-cards-container');
            let html = '';
            daysKeys.forEach(day => {
                const d = workoutData[day];
                const dateNum = currentDates[day] ? currentDates[day].num : '--';
                const dateMonth = currentDates[day] ? currentDates[day].month : '--';
                
                let suppsHTML = '';
                if(d.supps && d.supps.length > 0) {
                    suppsHTML = `<div class="supps-pill">${iconCup} <div>Добавки <span>${d.supps.length} шт.</span></div></div>`;
                }

                html += `
                <div class="card" onclick="window.openModal('${day}')">
                    <div class="date-col">
                        <div class="day-name">${daysMap[day]}</div>
                        <div class="day-num" id="date-${day}">${dateNum}</div>
                        <div class="month-name" id="month-${day}">${dateMonth}</div>
                    </div>
                    <div class="info-col">
                        <div class="title">${d.title}</div>
                        <div class="subtitle">${d.sub}</div>
                        <div class="supps-container">${suppsHTML}</div>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        // ВІДМАЛЬОВКА ДО ТОГО ЯК ЗАВАНТАЖИТЬСЯ FIREBASE (Усуває порожній екран)
        setWeekDates();
        renderMainCards();
        updateRingsVisuals();

        onValue(rootRef, (snapshot) => {
            const dataVal = snapshot.val() || {};
            
            if(dataVal.workout_plan) workoutData = dataVal.workout_plan;
            else set(ref(db, 'workout_plan'), workoutData);

            if(dataVal.stats_array) {
                myStatsArray = dataVal.stats_array;
            } else {
                myStatsArray = [];
            }
            renderStatsTab();

            const currentWeekID = getMondayID();
            if (dataVal.last_reset_id !== currentWeekID) {
                set(ref(db, 'shared_week_progress'), {});
                set(ref(db, 'last_reset_id'), currentWeekID);
                savedProgress = {};
            } else {
                savedProgress = dataVal.shared_week_progress || {};
            }
            
            updateRingsVisuals();
            renderMainCards();
            
            if(document.getElementById('tab-edit').classList.contains('active')){
                window.loadDayForEdit();
            }
        });

        function setWeekDates() {
            let curr = new Date(); let day = curr.getDay(); let diff = curr.getDate() - day + (day === 0 ? -6 : 1); 
            let monday = new Date(curr.setDate(diff));
            for(let i = 0; i < 7; i++) {
                let loopDate = new Date(monday); loopDate.setDate(monday.getDate() + i);
                currentDates[daysKeys[i]] = { num: ('0' + loopDate.getDate()).slice(-2), month: months[loopDate.getMonth()] };
                rawDatesForCalendar[daysKeys[i]] = new Date(loopDate);
            }
        }

        function updateRingsVisuals() {
            daysKeys.forEach(day => {
                const ring = document.getElementById(`ring-${day}`);
                if(!ring) return;
                const path = ring.querySelector('.circle');
                if (savedProgress[day]) {
                    path.style.strokeDasharray = `100, 100`;
                    path.style.stroke = 'var(--primary-orange)';
                } else {
                    path.style.strokeDasharray = `0, 100`;
                    path.style.stroke = '#e0e0e0';
                }
            });
        }

        window.switchTab = function(tabId, el) {
            document.querySelectorAll('.tab-view').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            
            document.querySelectorAll('.bottom-nav .nav-item').forEach(n => n.classList.remove('active'));
            
            if (tabId === 'edit') document.getElementById('nav-edit-center').classList.add('active');
            else document.getElementById(`nav-${tabId}`).classList.add('active');
            
            if(tabId === 'edit') window.loadDayForEdit();
        }

        function renderStatsTab() {
            const ringsContainer = document.getElementById('stats-rings-container');
            const editList = document.getElementById('stats-edit-list');
            let ringsHTML = '';
            let editHTML = '';

            if (myStatsArray && myStatsArray.length > 0) {
                myStatsArray.forEach((stat, idx) => {
                    let curr = parseFloat(stat.current) || 0;
                    let goal = parseFloat(stat.goal) || 1;
                    let percent = Math.round((curr / goal) * 100);
                    if (percent > 100) percent = 100;

                    ringsHTML += `
                    <div class="stat-ring-card">
                        <svg viewBox="0 0 36 36" class="large-circular-chart">
                            <path class="circle-bg-dashed" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <path class="circle" stroke-dasharray="${percent}, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <text x="18" y="14" class="stat-name-text">${stat.name}</text>
                            <text x="18" y="21.5" class="percentage">${percent}%</text>
                            <text x="18" y="26" class="stat-val-text">${stat.current} / ${stat.goal}</text>
                        </svg>
                    </div>`;

                    editHTML += `<div class="edit-list-item"><div><div class="edit-info-title">${stat.name}</div><div class="edit-info-sub">Зараз: ${stat.current} | Ціль: ${stat.goal}</div></div><div class="edit-actions"><button class="action-btn" onclick="window.editStat(${idx})">${iconEdit}</button><button class="action-btn" onclick="window.deleteStat(${idx})">${iconTrash}</button></div></div>`;
                });
            } else {
                ringsHTML = `<div style="text-align:center; width:100%; color:var(--text-muted); font-size:14px;">Показників ще немає. Додай їх нижче!</div>`;
            }

            ringsContainer.innerHTML = ringsHTML;
            editList.innerHTML = editHTML;
            
            const toggle = document.getElementById('calendar-toggle');
            toggle.checked = localStorage.getItem('gymgo_push') === 'true';
        }

        window.addStat = function() {
            const name = prompt("Назва (напр. Жим, Вага тіла, Біцепс):", "Новий показник");
            if(!name) return;
            const current = prompt("Поточне значення:", "0");
            const goal = prompt("Цільове значення:", "100");
            
            if(!myStatsArray) myStatsArray = [];
            myStatsArray.push({ name, current, goal });
            set(ref(db, 'stats_array'), myStatsArray);
        }

        window.editStat = function(idx) {
            const stat = myStatsArray[idx];
            const name = prompt("Назва показника:", stat.name);
            if(!name) return;
            const current = prompt("Поточне значення:", stat.current);
            const goal = prompt("Цільове значення:", stat.goal);
            
            myStatsArray[idx] = { name, current, goal };
            set(ref(db, 'stats_array'), myStatsArray);
        }

        window.deleteStat = function(idx) {
            if(confirm("Видалити цей показник?")) {
                myStatsArray.splice(idx, 1);
                set(ref(db, 'stats_array'), myStatsArray);
            }
        }

        window.toggleCalendar = function(el) {
            if (el.checked) {
                localStorage.setItem('gymgo_push', 'true');
                generateAndDownloadICS();
                alert("⏳ Генеруємо розклад...\n\nКоли iPhone запитає, натисни 'Додати всі події', щоб сповіщення запрацювали!");
            } else {
                localStorage.setItem('gymgo_push', 'false');
                alert("ℹ️ Щоб повністю видалити сповіщення:\n\n1. Відкрий на iPhone додаток «Календар»\n2. Натисни «Календарі» внизу\n3. Знайди 'Gym Go Schedule' та видали його.");
            }
        }

        function generateAndDownloadICS() {
            let icsMSG = "BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//Gym Go Pro//UA\nCALSCALE:GREGORIAN\nX-WR-CALNAME:Gym Go Schedule\n";
            
            const formatDate = (dateObj, hour) => {
                let d = new Date(dateObj);
                d.setHours(hour, 0, 0, 0);
                return d.toISOString().replace(/-|:/g, '').split('.')[0] + 'Z';
            };

            daysKeys.forEach(day => {
                const d = workoutData[day];
                const actualDate = rawDatesForCalendar[day];

                if (d.exercises && d.exercises.length > 0) {
                    icsMSG += "BEGIN:VEVENT\n";
                    icsMSG += `DTSTART:${formatDate(actualDate, 10)}\n`;
                    icsMSG += `DTEND:${formatDate(actualDate, 11)}\n`;
                    icsMSG += `SUMMARY:Gym Go: ${d.title}\n`;
                    icsMSG += `DESCRIPTION:${d.sub}\\n\\nЗайди в додаток Gym Go, щоб відмітити прогрес!\n`;
                    icsMSG += "BEGIN:VALARM\nTRIGGER:-PT15M\nACTION:DISPLAY\nDESCRIPTION:Нагадування\nEND:VALARM\n"; 
                    icsMSG += "END:VEVENT\n";
                }

                if (d.supps && d.supps.length > 0) {
                    d.supps.forEach(supp => {
                        icsMSG += "BEGIN:VEVENT\n";
                        icsMSG += `DTSTART:${formatDate(actualDate, 9)}\n`;
                        icsMSG += `DTEND:${formatDate(actualDate, 9)}\n`; 
                        icsMSG += `SUMMARY:Добавка: ${supp.text}\n`;
                        icsMSG += `DESCRIPTION:Час прийому: ${supp.time}\n`;
                        icsMSG += "BEGIN:VALARM\nTRIGGER:-PT0M\nACTION:DISPLAY\nDESCRIPTION:Нагадування\nEND:VALARM\n"; 
                        icsMSG += "END:VEVENT\n";
                    });
                }
            });

            icsMSG += "END:VCALENDAR";
            const blob = new Blob([icsMSG], { type: 'text/calendar;charset=utf-8' });
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(blob);
            link.setAttribute('download', 'gym_go_schedule.ics');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        window.openModal = function(dayKey) {
            const d = workoutData[dayKey]; currentActiveDay = dayKey;
            document.getElementById('m-title').innerText = d.title; document.getElementById('m-subtitle').innerText = d.sub;
            
            let suppsHTML = ''; 
            if(d.supps) {
                d.supps.forEach(s => { suppsHTML += `<div class="supp-box ${(!d.exercises || d.exercises.length === 0) ? 'rest-box' : ''}" style="cursor: pointer; transition: opacity 0.2s;" onclick="this.style.opacity = this.style.opacity === '0.3' ? '1' : '0.3'"><div><div class="supp-time">${iconClock} ${s.time}</div><div class="supp-desc">${s.text}</div></div></div>`; });
            }
            document.getElementById('m-supps').innerHTML = suppsHTML;

            let exHTML = '';
            if(d.exercises && d.exercises.length > 0) {
                document.getElementById('ex-title').style.display = 'flex';
                d.exercises.forEach(e => { 
                    exHTML += `<div class="exercise-item" style="cursor: pointer; transition: opacity 0.2s;" onclick="this.style.opacity = this.style.opacity === '0.3' ? '1' : '0.3'"><div class="ex-name">${e.name}</div><div class="ex-sets">${e.sets}</div></div>`; 
                });
            } else { 
                document.getElementById('ex-title').style.display = 'none'; 
                exHTML = `<div style="text-align:center; padding: 20px; color:var(--text-muted);">Сьогодні м'язи відпочивають.</div>`; 
            }
            document.getElementById('m-exercises').innerHTML = exHTML;
            
            const btn = document.getElementById('m-btn');
            if(savedProgress[currentActiveDay]) { 
                btn.className = `complete-btn done`; 
                btn.innerHTML = `${iconCheck} ВИКОНАНО (ДЛЯ ОБОХ)`; 
            } else { 
                btn.className = `complete-btn`; 
                btn.innerHTML = ((d.exercises && d.exercises.length > 0) ? 'ЗАВЕРШИТИ ТРЕНУВАННЯ' : 'ВІДМІТИТИ ВІДПОЧИНОК'); 
            }
            
            document.getElementById('modal').classList.add('active'); if (navigator.vibrate) navigator.vibrate(10);
        }

        window.closeModal = function() { document.getElementById('modal').classList.remove('active'); }

        window.markDone = function() {
            if(savedProgress[currentActiveDay]) { window.closeModal(); return; } 
            savedProgress[currentActiveDay] = true;
            set(ref(db, 'shared_week_progress'), savedProgress);
            if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
            window.closeModal();
        }

        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 400);
            }, 1000);
        });

        document.getElementById('modal').addEventListener('click', function(e) { if(e.target === this) window.closeModal(); });
    </script>
</body>
</html>
