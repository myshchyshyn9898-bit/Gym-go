<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gym Go">
    <meta name="theme-color" content="#ffffff">
    
    <link rel="apple-touch-icon" href="https://img.icons8.com/nolan/256/dumbbell.png">
    <link rel="icon" type="image/png" href="https://img.icons8.com/nolan/256/dumbbell.png">

    <title>Gym Go - Premium UI</title>
    
    <style>
        :root {
            --bg-color: #fcfaf7; 
            --card-bg: #ffffff; 
            --text-main: #000000; 
            --text-muted: #888888; 
            --primary-orange: #e68c3a; 
            --primary-blue: #4a6cf7; 
            --shadow: 0 12px 35px rgba(0,0,0,0.06); 
            --bg-tabbar: rgba(15, 15, 15, 0.9); 
        }

        body {
            background-color: var(--bg-color); color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 20px; padding-bottom: 120px;
            -webkit-font-smoothing: antialiased; overflow-x: hidden;
        }

        /* Анімації */
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        #splash-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: var(--bg-color); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.4s ease-out; }
        .splash-logo { font-size: 42px; font-weight: 900; color: var(--text-main); letter-spacing: 2px; text-transform: uppercase; display: flex; align-items: center; gap: 10px; }
        .splash-logo span { color: var(--primary-orange); }
        .splash-loader { width: 40px; height: 4px; background: #e0e0e0; margin-top: 20px; border-radius: 2px; overflow: hidden; }
        .splash-loader-bar { width: 0%; height: 100%; background: var(--primary-orange); animation: load 1s forwards; }
        @keyframes load { 100% { width: 100%; } }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; margin-top: 15px; animation: fadeIn 0.5s ease; }
        h1 { font-size: 22px; font-weight: 800; margin: 0; letter-spacing: 0.5px; display: flex; align-items: center; gap: 8px;}
        h1 span { color: var(--text-muted); font-weight: 500; display: flex; align-items: center; gap: 5px; font-size: 16px;}
        .live-dot { width: 8px; height: 8px; background: #FF453A; border-radius: 50%; box-shadow: 0 0 8px #FF453A; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }

        .progress-section { display: flex; justify-content: space-between; margin-bottom: 30px; gap: 5px; animation: slideUp 0.6s ease; }
        .ring-container { display: flex; flex-direction: column; align-items: center; width: 14%; }
        .circular-chart { max-width: 40px; max-height: 40px; }
        .circle-bg { fill: none; stroke: #e0e0e0; stroke-width: 3.8; }
        .circle { fill: none; stroke-width: 2.8; stroke-linecap: round; transition: stroke-dasharray 0.5s ease, stroke 0.3s; stroke: var(--primary-orange); }
        .ring-label { font-size: 10px; color: var(--text-muted); margin-top: 6px; font-weight: 600; }

        /* 🔥 ОНОВЛЕНІ КАРТКИ ДНІВ ТИЖНЯ 🔥 */
        .card { background: var(--card-bg); border-radius: 24px; padding: 25px 20px; margin-bottom: 15px; display: flex; align-items: center; position: relative; overflow: hidden; cursor: pointer; box-shadow: var(--shadow); transition: transform 0.2s, box-shadow 0.2s; animation: slideUp 0.5s ease backwards; }
        .card:active { transform: scale(0.97); box-shadow: 0 5px 15px rgba(0,0,0,0.04); }
        .date-col { text-align: center; margin-right: 20px; min-width: 50px; background: #f9f9f9; padding: 12px 10px; border-radius: 18px; }
        .day-name { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--primary-orange); }
        .day-num { font-size: 26px; font-weight: 900; margin: 2px 0; color: #000; }
        .month-name { font-size: 10px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; }
        .info-col { flex-grow: 1; }
        .title { font-size: 18px; font-weight: 800; margin-bottom: 6px; text-transform: uppercase; color: #000; }
        .subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; font-weight: 500; }
        .supps-container { display: flex; flex-wrap: wrap; gap: 8px; }
        .supps-pill { display: inline-flex; align-items: center; background: rgba(230, 140, 58, 0.1); border-radius: 12px; padding: 6px 12px; font-size: 12px; font-weight: 700; gap: 6px; color: var(--primary-orange); }
        
        .tab-view { display: none; }
        .tab-view.active { display: block; animation: fadeIn 0.4s ease; }
        
        input[type="text"], select { background: #f4f5f7; border: 2px solid transparent; color: var(--text-main); padding: 16px 20px; border-radius: 16px; width: 100%; box-sizing: border-box; margin-bottom: 15px; font-family: inherit; font-size: 16px; font-weight: 600; -webkit-appearance: none; transition: 0.3s; }
        input:focus, select:focus { outline: none; border-color: var(--primary-orange); background: #fff; box-shadow: 0 0 0 4px rgba(230, 140, 58, 0.1); }

        .section-title { font-size: 13px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 12px; font-weight: 800; display: flex; align-items: center; gap: 6px;}
        
        /* 🔥 ОНОВЛЕНІ КАРТКИ ВПРАВ ТА ДОБАВОК У РЕДАКТОРІ 🔥 */
        .edit-list-item { background: #fff; padding: 18px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; box-shadow: var(--shadow); border: 1px solid #f1f1f1; animation: scaleIn 0.3s ease backwards; }
        .edit-info-title { font-size: 16px; font-weight: 800; color: #000; }
        .edit-info-sub { font-size: 13px; color: var(--primary-blue); margin-top: 6px; font-weight: 700; display: flex; align-items: center; gap: 4px; background: rgba(74, 108, 247, 0.1); padding: 4px 8px; border-radius: 8px; display: inline-flex;}
        .edit-info-sub.supp { color: var(--primary-orange); background: rgba(230, 140, 58, 0.1); }
        .edit-actions { display: flex; gap: 10px; }
        .action-btn { background: #f4f5f7; width: 36px; height: 36px; border-radius: 12px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-main); transition: 0.2s;}
        .action-btn.delete { color: #FF3B30; background: rgba(255, 59, 48, 0.1); }
        .action-btn:active { transform: scale(0.9); }
        
        .add-btn-small { background: rgba(230, 140, 58, 0.05); color: var(--primary-orange); border: 2px dashed rgba(230, 140, 58, 0.3); width: 100%; padding: 16px; border-radius: 16px; font-weight: 800; cursor: pointer; margin-bottom: 25px; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s;}
        .add-btn-small:active { background: rgba(230, 140, 58, 0.1); transform: scale(0.98); }
        
        .complete-btn { background: #000000; color: #ffffff; width: 100%; padding: 20px; border-radius: 20px; font-weight: 800; border: none; font-size: 16px; margin-top: 30px; margin-bottom: 20px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.15);}
        .complete-btn:active { transform: scale(0.96); }
        .complete-btn.done { background: var(--primary-orange); box-shadow: 0 10px 20px rgba(230, 140, 58, 0.3); }

        /* 🔥 МОДАЛКА ДНЯ ТА НОВІ ВІДЖЕТИ 🔥 */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: flex-end; z-index: 1000; opacity: 0; transition: opacity 0.3s ease; }
        .modal-content { background: var(--bg-color); width: 100%; border-radius: 35px 35px 0 0; padding: 35px 25px 40px; box-sizing: border-box; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1); max-height: 90vh; overflow-y: auto; position: relative; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .close-btn { position: absolute; top: 20px; right: 20px; background: #f1f1f1; border-radius: 50%; width: 36px; height: 36px; display: flex; justify-content: center; align-items: center; color: #000; cursor: pointer; z-index: 10; font-weight: bold;}
        .modal-title { font-size: 26px; font-weight: 900; margin-bottom: 5px; color: #000; }
        .modal-subtitle { color: var(--text-muted); margin-bottom: 30px; font-size: 15px; font-weight: 500; }
        
        .exercise-item { background: #fff; padding: 18px; border-radius: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); border: 1px solid #f9f9f9; transition: 0.2s;}
        .ex-name { font-size: 16px; font-weight: 800; display: flex; align-items: center; gap: 10px;}
        .ex-icon { background: #f4f5f7; width: 36px; height: 36px; border-radius: 10px; display: flex; justify-content: center; align-items: center; color: var(--text-main); }
        .ex-sets { background: var(--primary-blue); color: white; padding: 6px 12px; border-radius: 10px; font-size: 14px; font-weight: 800; box-shadow: 0 4px 10px rgba(74, 108, 247, 0.3); }
        
        .supp-box { background: linear-gradient(135deg, rgba(230, 140, 58, 0.1), rgba(230, 140, 58, 0.02)); border: 1px solid rgba(230, 140, 58, 0.2); padding: 18px; border-radius: 20px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; transition: 0.2s;}
        .supp-time { font-size: 12px; color: var(--primary-orange); margin-bottom: 4px; font-weight: 800; display: flex; align-items: center; gap: 4px;}
        .supp-desc { font-size: 16px; font-weight: 800; color: #000;}
        .supp-icon { background: white; width: 40px; height: 40px; border-radius: 12px; display: flex; justify-content: center; align-items: center; color: var(--primary-orange); box-shadow: 0 4px 10px rgba(0,0,0,0.05);}

        /* 🔥 НОВІ ВІКНА РЕДАГУВАННЯ (BOTTOM SHEETS) 🔥 */
        .bottom-sheet { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); z-index: 1001; display: none; justify-content: center; align-items: flex-end; opacity: 0; transition: opacity 0.3s ease; }
        .bs-content { background: var(--card-bg); width: 100%; border-radius: 35px 35px 0 0; padding: 30px 25px 50px; box-sizing: border-box; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1); }
        .bottom-sheet.active { display: flex; opacity: 1; }
        .bottom-sheet.active .bs-content { transform: translateY(0); }
        .bs-title { font-size: 22px; font-weight: 900; margin-bottom: 25px; text-align: center; }

        /* Нижня навігація */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-tabbar); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: flex; justify-content: space-around; align-items: center; padding: 15px 10px 30px; z-index: 900; border-radius: 30px 30px 0 0; }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; color: var(--text-muted); cursor: pointer; width: 20%; transition: color 0.2s; opacity: 0.7; }
        .nav-item.active { color: #ffffff; opacity: 1; }
        .nav-item.center-btn { position: relative; background: var(--primary-orange); width: 60px; height: 60px; border-radius: 50%; opacity: 1; color: #ffffff; box-shadow: 0 5px 20px rgba(230, 140, 58, 0.4); }
        .nav-icon { height: 24px; width: 24px; display: flex; justify-content: center; align-items: center; }
        .nav-icon svg { width: 100%; height: 100%; fill: currentColor; }
        .nav-text { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

        .svg-icon { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-logo">GYM <span>GO</span></div>
        <div class="splash-loader"><div class="splash-loader-bar"></div></div>
    </div>
    <script>setTimeout(function(){ var s = document.getElementById('splash-screen'); if(s){ s.style.opacity='0'; setTimeout(function(){s.style.display='none';},400); } }, 1000);</script>

    <header><h1>GYM GO <span><div class="live-dot"></div> LIVE SYNC</span></h1></header>

    <div id="tab-home" class="tab-view active">
        <div class="progress-section">
            <div class="ring-container"><svg viewBox="0 0 36 36" class="circular-chart"><path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" /><path class="circle" id="ring-mon" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" /></svg><div class="ring-label">ПН</div></div>
            <div class="ring-container"><svg viewBox="0 0 36 36" class="circular-chart"><path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" /><path class="circle" id="ring-tue" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" /></svg><div class="ring-label">ВТ</div></div>
            <div class="ring-container"><svg viewBox="0 0 36 36" class="circular-chart"><path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" /><path class="circle" id="ring-wed" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" /></svg><div class="ring-label">СР</div></div>
            <div class="ring-container"><svg viewBox="0 0 36 36" class="circular-chart"><path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" /><path class="circle" id="ring-thu" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" /></svg><div class="ring-label">ЧТ</div></div>
            <div class="ring-container"><svg viewBox="0 0 36 36" class="circular-chart"><path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" /><path class="circle" id="ring-fri" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" /></svg><div class="ring-label">ПТ</div></div>
            <div class="ring-container"><svg viewBox="0 0 36 36" class="circular-chart"><path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" /><path class="circle" id="ring-sat" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" /></svg><div class="ring-label">СБ</div></div>
            <div class="ring-container"><svg viewBox="0 0 36 36" class="circular-chart"><path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" /><path class="circle" id="ring-sun" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" /></svg><div class="ring-label">НД</div></div>
        </div>
        <div id="workout-cards-container"></div>
    </div>

    <div id="tab-edit" class="tab-view">
        <div class="section-title" style="margin-bottom: 15px;"><svg class="svg-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle></svg> Редагування плану</div>
        
        <select id="edit-day-select" onchange="window.loadDayForEdit()">
            <option value="mon">Понеділок (Push)</option>
            <option value="tue">Вівторок (Відпочинок)</option>
            <option value="wed">Середа (Pull)</option>
            <option value="thu">Четвер (Відпочинок)</option>
            <option value="fri">П'ятниця (Legs)</option>
            <option value="sat">Субота (Upper Focus)</option>
            <option value="sun">Неділя (Відпочинок)</option>
        </select>

        <div style="background: var(--card-bg); padding: 20px; border-radius: 20px; margin-bottom: 20px; box-shadow: var(--shadow);">
            <div class="section-title" style="margin-bottom: 10px;">Назва та фокус дня</div>
            <input type="text" id="edit-title" placeholder="Назва тренування" onchange="window.quickSaveHeader()">
            <input type="text" id="edit-sub" placeholder="Підзаголовок" style="margin-bottom: 0;" onchange="window.quickSaveHeader()">
        </div>

        <div class="section-title">Добавки на цей день</div>
        <div id="edit-supps-list" style="margin-top: 15px;"></div>
        <button class="add-btn-small" onclick="window.openSuppModal(-1)">+ ДОДАТИ ДОБАВКУ</button>

        <div class="section-title" style="margin-top: 30px;">Вправи на цей день</div>
        <div id="edit-exercises-list" style="margin-top: 15px;"></div>
        <button class="add-btn-small" onclick="window.openExerciseModal(-1)">+ ДОДАТИ ВПРАВУ</button>
    </div>

    <div id="bs-exercise" class="bottom-sheet">
        <div class="bs-content">
            <div class="close-btn" style="top: 15px;" onclick="window.closeExerciseModal()">✕</div>
            <div class="bs-title" id="bs-ex-title">Нова вправа</div>
            <div class="section-title">Назва вправи</div>
            <input type="text" id="inp-ex-name" placeholder="Напр. Жим лежачи">
            <div class="section-title">Підходи та повторення</div>
            <input type="text" id="inp-ex-sets" placeholder="Напр. 4 × 10-12">
            <button class="complete-btn" style="margin-bottom: 0;" onclick="window.saveExercise()">ЗБЕРЕГТИ</button>
        </div>
    </div>

    <div id="bs-supp" class="bottom-sheet">
        <div class="bs-content">
            <div class="close-btn" style="top: 15px;" onclick="window.closeSuppModal()">✕</div>
            <div class="bs-title" id="bs-supp-title">Добавка</div>
            <div class="section-title">Що п'ємо?</div>
            <input type="text" id="inp-supp-text" placeholder="Напр. Протеїн + Креатин">
            <div class="section-title">Час прийому</div>
            <select id="inp-supp-time">
                <option value="ЗРАНКУ">ЗРАНКУ</option>
                <option value="ПЕРЕД ТРЕНУВАННЯМ">ПЕРЕД ТРЕНУВАННЯМ</option>
                <option value="ПІСЛЯ ТРЕНУВАННЯ">ПІСЛЯ ТРЕНУВАННЯ</option>
                <option value="ВВЕЧЕРІ">ВВЕЧЕРІ</option>
            </select>
            <button class="complete-btn" style="margin-bottom: 0;" onclick="window.saveSupp()">ЗБЕРЕГТИ</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div id="nav-home" class="nav-item active" onclick="window.switchTab('home', this)">
            <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>
            <div class="nav-text">Головна</div>
        </div>
        <div id="nav-edit-center" class="nav-item center-btn" onclick="window.switchTab('edit', this)">
            <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg></div>
        </div>
        <div id="nav-stats" class="nav-item" style="opacity: 0; pointer-events: none;"><div class="nav-text">⚙️</div></div>
    </nav>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div class="close-btn" onclick="window.closeModal()">✕</div>
            <div id="modal-header"><div class="modal-title" id="m-title">Title</div><div class="modal-subtitle" id="m-subtitle">Subtitle</div></div>
            
            <div class="section-title">💊 Протокол добавок</div>
            <div id="m-supps" style="margin-top: 15px;"></div>
            
            <div class="section-title" id="ex-title" style="margin-top: 30px;">🏋️ Вправи на сьогодні</div>
            <div id="m-exercises" style="margin-top: 15px;"></div>
            
            <button id="m-btn" class="complete-btn" onclick="window.markDone()">ЗАВЕРШИТИ ДЕНЬ</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // Іконки
        const iconCup = `<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"></path><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path></svg>`;
        const iconEdit = `<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>`;
        const iconTrash = `<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>`;
        const iconClock = `<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>`;
        const iconDumbbell = `<svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M20.5 12.5l-3-3a1 1 0 0 0-1.4 1.4l1.3 1.3H14v-2.3l1.3-1.3a1 1 0 0 0-1.4-1.4l-3 3a1 1 0 0 0 1.4 1.4l1.3-1.3V14H6.6l1.3-1.3a1 1 0 0 0-1.4-1.4l-3 3a1 1 0 0 0 1.4 1.4l1.3-1.3h10.8l-1.3 1.3a1 1 0 0 0 1.4 1.4l3-3a1 1 0 0 0 0-1.4z"/></svg>`;
        const iconCheck = `<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;

        const firebaseConfig = {
            apiKey: "AIzaSyBRSU_3_0pueE5kQfY_3jr1TNCozF1lOsw",
            authDomain: "go-gym-e604f.firebaseapp.com",
            projectId: "go-gym-e604f",
            storageBucket: "go-gym-e604f.firebasestorage.app",
            messagingSenderId: "284048669638",
            appId: "1:284048669638:web:c89a7d67b9be64298750c7",
            databaseURL: "https://go-gym-e604f-default-rtdb.europe-west1.firebasedatabase.app" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const rootRef = ref(db, '/');

        let savedProgress = {};
        const daysKeys = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'];
        const daysMap = { 'mon':'ПН', 'tue':'ВТ', 'wed':'СР', 'thu':'ЧТ', 'fri':'ПТ', 'sat':'СБ', 'sun':'НД' };
        const months = ['Січ', 'Лют', 'Бер', 'Кві', 'Тра', 'Чер', 'Лип', 'Сер', 'Вер', 'Жов', 'Лис', 'Гру'];

        let workoutData = {
            'mon': { title: 'Тренування Push', sub: 'Понеділок • Груди, Плечі, Тріцепс', supps: [{ time: 'ЗРАНКУ', text: '1 порція Протеїну' }], exercises: [{ name: 'Жим лежачи', sets: '4 × 10' }] },
            'tue': { title: 'Відпочинок', sub: 'Вівторок • Відновлення', supps: [], exercises: [] },
            'wed': { title: 'Тренування Pull', sub: 'Середа • Спина, Біцепс', supps: [], exercises: [{ name: 'Підтягування', sets: '4 × Max' }] },
            'thu': { title: 'Відпочинок', sub: 'Четвер', supps: [], exercises: [] },
            'fri': { title: 'Тренування Legs', sub: 'П\'ятниця • Ноги', supps: [], exercises: [{ name: 'Присідання', sets: '4 × 10' }] },
            'sat': { title: 'Upper Focus', sub: 'Субота', supps: [], exercises: [] },
            'sun': { title: 'Відпочинок', sub: 'Неділя', supps: [], exercises: [] }
        };

        let currentActiveDay = '';
        let currentDates = {};

        // Глобальні змінні для модалок редактора
        window.editExIndex = -1;
        window.editSuppIndex = -1;

        function getMondayID() {
            let curr = new Date(); let day = curr.getDay(); let diff = curr.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(curr.setDate(diff)).toDateString(); 
        }

        // Рендер Головної
        function renderMainCards() {
            const container = document.getElementById('workout-cards-container');
            let html = '';
            daysKeys.forEach((day, index) => {
                const d = workoutData[day];
                const dateNum = currentDates[day] ? currentDates[day].num : '--';
                const dateMonth = currentDates[day] ? currentDates[day].month : '--';
                
                let suppsHTML = '';
                if(d.supps && d.supps.length > 0) { 
                    suppsHTML = `<div class="supps-pill">${iconCup} <div>Добавки <span>${d.supps.length} шт.</span></div></div>`; 
                }
                
                // Додаємо затримку анімації (каскадна поява)
                let delay = index * 0.1;

                html += `
                <div class="card" onclick="window.openModal('${day}')" style="animation-delay: ${delay}s">
                    <div class="date-col">
                        <div class="day-name">${daysMap[day]}</div>
                        <div class="day-num" id="date-${day}">${dateNum}</div>
                        <div class="month-name" id="month-${day}">${dateMonth}</div>
                    </div>
                    <div class="info-col">
                        <div class="title">${d.title}</div>
                        <div class="subtitle">${d.sub}</div>
                        <div class="supps-container">${suppsHTML}</div>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        setWeekDates();
        renderMainCards();

        onValue(rootRef, (snapshot) => {
            const dataVal = snapshot.val() || {};
            if(dataVal.workout_plan) workoutData = dataVal.workout_plan;
            else set(ref(db, 'workout_plan'), workoutData);

            const currentWeekID = getMondayID();
            if (dataVal.last_reset_id !== currentWeekID) {
                set(ref(db, 'shared_week_progress'), {});
                set(ref(db, 'last_reset_id'), currentWeekID);
                savedProgress = {};
            } else {
                savedProgress = dataVal.shared_week_progress || {};
            }
            
            updateRingsVisuals();
            renderMainCards();
            if(document.getElementById('tab-edit').classList.contains('active')) window.loadDayForEdit();
        });

        function setWeekDates() {
            let curr = new Date(); let day = curr.getDay(); let diff = curr.getDate() - day + (day === 0 ? -6 : 1); 
            let monday = new Date(curr.setDate(diff));
            for(let i = 0; i < 7; i++) {
                let loopDate = new Date(monday); loopDate.setDate(monday.getDate() + i);
                currentDates[daysKeys[i]] = { num: ('0' + loopDate.getDate()).slice(-2), month: months[loopDate.getMonth()] };
            }
        }

        function updateRingsVisuals() {
            daysKeys.forEach(day => {
                const path = document.getElementById(`ring-${day}`);
                if(!path) return;
                if (savedProgress[day]) { path.style.strokeDasharray = `100, 100`; path.style.stroke = 'var(--primary-orange)'; } 
                else { path.style.strokeDasharray = `0, 100`; path.style.stroke = '#e0e0e0'; }
            });
        }

        window.switchTab = function(tabId, el) {
            document.querySelectorAll('.tab-view').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            document.querySelectorAll('.bottom-nav .nav-item').forEach(n => n.classList.remove('active'));
            
            if (tabId === 'edit') document.getElementById('nav-edit-center').classList.add('active');
            else document.getElementById(`nav-${tabId}`).classList.add('active');
            
            if(tabId === 'edit') window.loadDayForEdit();
        }

        // 🔥 РЕДАКТОР ІЗ КАРТКАМИ 🔥
        window.loadDayForEdit = function() {
            const day = document.getElementById('edit-day-select').value;
            const d = workoutData[day];
            document.getElementById('edit-title').value = d.title || '';
            document.getElementById('edit-sub').value = d.sub || '';
            
            let sHTML = '';
            if(d.supps) { 
                d.supps.forEach((s, idx) => { 
                    sHTML += `<div class="edit-list-item" style="animation-delay:${idx*0.05}s"><div><div class="edit-info-title">${s.text}</div><div class="edit-info-sub supp">${iconClock} ${s.time}</div></div><div class="edit-actions"><button class="action-btn" onclick="window.openSuppModal(${idx})">${iconEdit}</button><button class="action-btn delete" onclick="window.deleteSupp(${idx})">${iconTrash}</button></div></div>`; 
                }); 
            }
            document.getElementById('edit-supps-list').innerHTML = sHTML;
            
            let eHTML = '';
            if(d.exercises) { 
                d.exercises.forEach((ex, idx) => { 
                    eHTML += `<div class="edit-list-item" style="animation-delay:${idx*0.05}s"><div><div class="edit-info-title">${ex.name}</div><div class="edit-info-sub">${ex.sets}</div></div><div class="edit-actions"><button class="action-btn" onclick="window.openExerciseModal(${idx})">${iconEdit}</button><button class="action-btn delete" onclick="window.deleteExercise(${idx})">${iconTrash}</button></div></div>`; 
                }); 
            }
            document.getElementById('edit-exercises-list').innerHTML = eHTML;
        }

        window.quickSaveHeader = function() {
            const day = document.getElementById('edit-day-select').value;
            workoutData[day].title = document.getElementById('edit-title').value;
            workoutData[day].sub = document.getElementById('edit-sub').value;
            set(ref(db, 'workout_plan'), workoutData);
        }

        // 🔥 ВПРАВИ (BOTTOM SHEET) 🔥
        window.openExerciseModal = function(idx) {
            window.editExIndex = idx;
            const day = document.getElementById('edit-day-select').value;
            
            if (idx === -1) {
                document.getElementById('bs-ex-title').innerText = "Нова вправа";
                document.getElementById('inp-ex-name').value = "";
                document.getElementById('inp-ex-sets').value = "";
            } else {
                document.getElementById('bs-ex-title').innerText = "Редагувати вправу";
                document.getElementById('inp-ex-name').value = workoutData[day].exercises[idx].name;
                document.getElementById('inp-ex-sets').value = workoutData[day].exercises[idx].sets;
            }
            document.getElementById('bs-exercise').classList.add('active');
        }

        window.closeExerciseModal = function() {
            document.getElementById('bs-exercise').classList.remove('active');
        }

        window.saveExercise = function() {
            const name = document.getElementById('inp-ex-name').value;
            const sets = document.getElementById('inp-ex-sets').value;
            if(!name) return alert('Введіть назву вправи!');
            
            const day = document.getElementById('edit-day-select').value;
            if(!workoutData[day].exercises) workoutData[day].exercises = [];
            
            if (window.editExIndex === -1) {
                workoutData[day].exercises.push({ name, sets });
            } else {
                workoutData[day].exercises[window.editExIndex] = { name, sets };
            }
            
            set(ref(db, 'workout_plan'), workoutData);
            window.closeExerciseModal();
            window.loadDayForEdit();
        }

        window.deleteExercise = function(idx) {
            if(confirm("Видалити цю вправу?")) { 
                const day = document.getElementById('edit-day-select').value; 
                workoutData[day].exercises.splice(idx, 1); 
                set(ref(db, 'workout_plan'), workoutData); 
                window.loadDayForEdit();
            }
        }

        // 🔥 ДОБАВКИ (BOTTOM SHEET) 🔥
        window.openSuppModal = function(idx) {
            window.editSuppIndex = idx;
            const day = document.getElementById('edit-day-select').value;
            
            if (idx === -1) {
                document.getElementById('bs-supp-title').innerText = "Нова добавка";
                document.getElementById('inp-supp-text').value = "";
                document.getElementById('inp-supp-time').value = "ПІСЛЯ ТРЕНУВАННЯ";
            } else {
                document.getElementById('bs-supp-title').innerText = "Редагувати добавку";
                document.getElementById('inp-supp-text').value = workoutData[day].supps[idx].text;
                document.getElementById('inp-supp-time').value = workoutData[day].supps[idx].time;
            }
            document.getElementById('bs-supp').classList.add('active');
        }

        window.closeSuppModal = function() {
            document.getElementById('bs-supp').classList.remove('active');
        }

        window.saveSupp = function() {
            const text = document.getElementById('inp-supp-text').value;
            const time = document.getElementById('inp-supp-time').value;
            if(!text) return alert('Введіть назву добавки!');
            
            const day = document.getElementById('edit-day-select').value;
            if(!workoutData[day].supps) workoutData[day].supps = [];
            
            if (window.editSuppIndex === -1) {
                workoutData[day].supps.push({ time, text });
            } else {
                workoutData[day].supps[window.editSuppIndex] = { time, text };
            }
            
            set(ref(db, 'workout_plan'), workoutData);
            window.closeSuppModal();
            window.loadDayForEdit();
        }

        window.deleteSupp = function(idx) {
            if(confirm("Видалити цю добавку?")) { 
                const day = document.getElementById('edit-day-select').value; 
                workoutData[day].supps.splice(idx, 1); 
                set(ref(db, 'workout_plan'), workoutData); 
                window.loadDayForEdit();
            }
        }

        // 🔥 КРАСИВЕ МОДАЛЬНЕ ВІКНО ДНЯ 🔥
        window.openModal = function(dayKey) {
            const d = workoutData[dayKey]; currentActiveDay = dayKey;
            document.getElementById('m-title').innerText = d.title; document.getElementById('m-subtitle').innerText = d.sub;
            
            // Віджети добавок
            let suppsHTML = ''; 
            if(d.supps) { 
                d.supps.forEach((s, idx) => { 
                    suppsHTML += `<div class="supp-box" style="animation: scaleIn 0.3s ease ${idx*0.05}s backwards;">
                        <div class="supp-icon">${iconCup}</div>
                        <div><div class="supp-time">${iconClock} ${s.time}</div><div class="supp-desc">${s.text}</div></div>
                    </div>`; 
                }); 
            }
            document.getElementById('m-supps').innerHTML = suppsHTML;

            // Віджети вправ
            let exHTML = '';
            if(d.exercises && d.exercises.length > 0) {
                document.getElementById('ex-title').style.display = 'flex';
                d.exercises.forEach((e, idx) => { 
                    exHTML += `<div class="exercise-item" style="animation: scaleIn 0.3s ease ${idx*0.05}s backwards;">
                        <div class="ex-name"><div class="ex-icon">${iconDumbbell}</div> ${e.name}</div>
                        <div class="ex-sets">${e.sets}</div>
                    </div>`; 
                });
            } else { 
                document.getElementById('ex-title').style.display = 'none'; 
                exHTML = `<div style="text-align:center; padding: 20px; color:var(--text-muted); font-weight: 600;">Сьогодні відпочинок. Відновлюйся! 💤</div>`; 
            }
            document.getElementById('m-exercises').innerHTML = exHTML;
            
            const btn = document.getElementById('m-btn');
            if(savedProgress[currentActiveDay]) { btn.className = `complete-btn done`; btn.innerHTML = `${iconCheck} ВИКОНАНО`; } 
            else { btn.className = `complete-btn`; btn.innerHTML = ((d.exercises && d.exercises.length > 0) ? 'ЗАВЕРШИТИ ТРЕНУВАННЯ' : 'ВІДМІТИТИ ВІДПОЧИНОК'); }
            
            document.getElementById('modal').classList.add('active');
        }

        window.closeModal = function() { document.getElementById('modal').classList.remove('active'); }
        
        window.markDone = function() {
            if(savedProgress[currentActiveDay]) { window.closeModal(); return; } 
            savedProgress[currentActiveDay] = true;
            set(ref(db, 'shared_week_progress'), savedProgress);
            if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
            window.closeModal();
        }
    </script>
</body>
</html>
